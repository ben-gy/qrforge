<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#4f46e5" />

    <title>QRForge — tracking-free QR code generator & scanner</title>
    <meta
      name="description"
      content="Generate direct, tracking-free QR codes and scan them entirely in your browser. No uploads, no accounts, no redirect middleman. Works offline."
    />

    <!-- Open Graph / social preview -->
    <meta property="og:title" content="QRForge — tracking-free QR codes" />
    <meta
      property="og:description"
      content="Generate direct QR codes (WiFi, contact, links) and scan them — entirely in your browser. No uploads, no tracking redirect."
    />
    <meta property="og:type" content="website" />

    <!--
      CSP: strict. No connect-src beyond 'self' — this tool makes ZERO network
      calls at runtime. media-src blob: allows the camera preview; img-src
      data:/blob: allows the rendered QR canvas. That's the whole story.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; media-src 'self' blob:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'"
    />

    <link rel="stylesheet" href="/src/styles/main.css" />
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "ba2bab2193ba42c1bea3d6714fcd0e28"}'></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <a class="brand" href="/">
            <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
              <rect width="32" height="32" rx="7" fill="#4f46e5" />
              <g fill="#ffffff">
                <path d="M5 5h8v8H5V5zm2 2v4h4V7H7z" />
                <rect x="8" y="8" width="2" height="2" />
                <path d="M19 5h8v8h-8V5zm2 2v4h4V7h-4z" />
                <rect x="22" y="8" width="2" height="2" />
                <path d="M5 19h8v8H5v-8zm2 2v4h4v-4H7z" />
                <rect x="8" y="22" width="2" height="2" />
                <rect x="16" y="6" width="2" height="2" />
                <rect x="16" y="16" width="2" height="2" />
                <rect x="22" y="19" width="2" height="2" />
                <rect x="19" y="23" width="2" height="2" />
                <rect x="25" y="22" width="2" height="2" />
              </g>
            </svg>
            <span class="brand-name">QR<span class="brand-name-accent">Forge</span></span>
          </a>
          <div class="topbar-meta">
            <span><span class="meta-key">codes</span> <span class="meta-val">direct</span></span>
            <span><span class="meta-key">tracking</span> <span class="meta-val">none</span></span>
            <span><span class="meta-key">backend</span> <span class="meta-val">none</span></span>
          </div>
        </div>
        <nav class="topbar-nav">
          <button type="button" class="nav-link" data-modal="tmpl-how-it-works">how it works</button>
          <button type="button" class="nav-link" data-modal="tmpl-security">threat model</button>
          <button type="button" class="nav-link" data-modal="tmpl-about">about</button>
        </nav>
      </header>

      <div class="trust-banner" id="trust-banner" role="button" tabindex="0" title="Read the threat model">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>Everything happens in your browser. Codes are <strong>direct</strong> — no tracking redirect — and nothing you type or scan is ever uploaded.</span>
      </div>

      <div class="main-grid">
        <main id="app"><!-- populated by src/main.ts --></main>
        <aside id="event-drawer"><!-- populated by src/eventlog.ts --></aside>
      </div>

      <footer class="statusbar">
        <div>
          <span class="status-pill">
            <span class="dot-mini idle" id="sb-status-dot"></span>
            <span class="label" id="sb-status-label">ready</span>
          </span>
          <span id="sb-mode" class="status-pill"></span>
        </div>
        <div>
          <span id="sb-detail"><span class="sb-key">engine</span> <span id="sb-engine">—</span></span>
          <span class="attribution">Built by <a href="https://benrichardson.dev/" target="_blank" rel="noopener noreferrer">benrichardson.dev</a> · <a href="https://hub.benrichardson.dev" target="_blank" rel="noopener">more tools &amp; sites</a></span>
        </div>
      </footer>
    </div>

    <template id="tmpl-how-it-works">
      <div class="modal-content">
        <h2 class="modal-title">how it works</h2>
        <ol class="steps">
          <li>
            <span class="step-num">01</span>
            <div>
              <h3>pick what to encode</h3>
              <p>
                A link, plain text, your WiFi, a contact card, an email, an SMS,
                a phone number or a location. QRForge builds the exact payload
                string the QR standard defines for each.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">02</span>
            <div>
              <h3>forge the code locally</h3>
              <p>
                The QR matrix is computed in your browser and drawn as a crisp
                vector. Your data is baked <em>directly</em> into the code — there
                is no
                <span class="glossary-link" data-term="redirect">tracking redirect</span>
                in the middle, so no one can log who scans it, and it never
                expires.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">03</span>
            <div>
              <h3>tune &amp; export</h3>
              <p>
                Adjust the
                <span class="glossary-link" data-term="ecc">error-correction level</span>,
                size, colours and
                <span class="glossary-link" data-term="quiet-zone">quiet zone</span>,
                then download a scalable SVG or a PNG, copy it, or share it.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">04</span>
            <div>
              <h3>scan without uploading</h3>
              <p>
                Switch to Scan to read a code from an image or your live camera.
                Detection uses the browser's native
                <span class="glossary-link" data-term="barcodedetector">BarcodeDetector</span>
                (with a pure-JavaScript fallback) — the picture and every camera
                frame stay on your device.
              </p>
            </div>
          </li>
        </ol>
      </div>
    </template>

    <template id="tmpl-security">
      <div class="modal-content">
        <h2 class="modal-title">threat model</h2>
        <div class="security-grid">
          <div class="security-card good">
            <h3>what's protected</h3>
            <ul>
              <li>Everything you type — WiFi passwords, phone numbers, links — becomes a QR entirely on-device</li>
              <li>Images you scan and every camera frame — decoded locally, never uploaded</li>
              <li>Your codes are <em>direct</em>: the data is inside the code, with no third-party redirect that could log scans or expire the code</li>
            </ul>
          </div>
          <div class="security-card bad">
            <h3>what isn't</h3>
            <ul>
              <li>The QR code <em>is</em> the data — anyone who can see or scan it can read its contents, so don't publicly post a code containing a secret</li>
              <li>Loading this page is logged by GitHub Pages' CDN, like visiting any website</li>
            </ul>
          </div>
          <div class="security-card">
            <h3>trust surface</h3>
            <ul>
              <li>The static site bundle served by GitHub Pages (hash-pinned per deploy)</li>
              <li>The TLS chain between you and GitHub Pages</li>
              <li>Nothing else — the page makes <strong>zero</strong> network calls at runtime (enforced by its Content-Security-Policy) and works fully offline once loaded</li>
            </ul>
          </div>
        </div>
      </div>
    </template>

    <template id="tmpl-about">
      <div class="modal-content">
        <h2 class="modal-title">about QRForge</h2>
        <p class="about-lede">
          QRForge makes QR codes the honest way: your data goes straight into the
          code, with no tracking-redirect middleman, no account and no upload —
          and it scans codes back without touching a server either.
        </p>
        <p>
          Most "free" QR generators route your code through their own domain so
          they can count every scan and switch the code off if you stop paying.
          A code you forge here is yours forever and answers to no one.
        </p>
        <p>
          Built by
          <a href="https://benrichardson.dev/" target="_blank" rel="noopener noreferrer">benrichardson.dev</a>.
          Source on
          <a href="https://github.com/ben-gy/qrforge" target="_blank" rel="noopener noreferrer">GitHub</a>.
          QR generation by
          <a href="https://github.com/soldair/node-qrcode" target="_blank" rel="noopener noreferrer">node-qrcode</a>;
          fallback scanning by
          <a href="https://github.com/cozmo/jsQR" target="_blank" rel="noopener noreferrer">jsQR</a>.
        </p>
        <p class="about-fineprint">No analytics. No cookies. No third-party fonts. No telemetry.</p>
      </div>
    </template>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
